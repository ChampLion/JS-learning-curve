<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
   <div class="card">

    <div class="search-box">
        <input type="text" id="userInput" placeholder="Enter GitHub Username">
        <button id="searchBtn">Search</button>
    </div>

    <img id="avatar" src="" alt="Profile Picture">

    <h2 id="name">GitHub User</h2>

    <div class="stats">
        <div>
            <h3 id="followers">0</h3>
            <span>Followers</span>
        </div>

        <div>
            <h3 id="following">0</h3>
            <span>Following</span>
        </div>

        <div>
            <h3 id="repos">0</h3>
            <span>Repos</span>
        </div>
    </div>

</div>



 <script src="Code.js"></script>
</body>
</html>
